services:
  - type: web
    name: vigh-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && npm --prefix frontend install && npm --prefix frontend run build
    startCommand: npm run build && npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
